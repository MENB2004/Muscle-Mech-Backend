# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  - type: web
    name: muscle-mech-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL # Set this manually in the Render Dashboard
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: PYTHON_VERSION
        value: 3.10.0
